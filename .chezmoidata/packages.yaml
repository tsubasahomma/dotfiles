# =============================================================================
# [Architecture]: Declarative Package Schema (Zero-Toil Edition)
# =============================================================================
packages:
  headless:
    common:
      - ca-certificates
      - git
      - zsh
      - jq
      - socat
    linux:
      ubuntu:
        - build-essential
        - libssl-dev
        - eza
      debian:
        - build-essential
        - libssl-dev
      fedora:
        - gcc-c++
        - openssl-devel
      rhel:
        - gcc-c++
        - openssl-devel
      arch:
        - base-devel
        - openssl
    darwin:
      brews:
        - openssl@3
        - colima
        - just
        - atuin
        - duckdb
        - deno
        - eza
        - xh
        - awscli
        - azure-cli
      casks: []
    windows:
      - Atuinsh.Atuin
      - DuckDB.cli
      - DenoLand.Deno
      - eza-community.eza
      - ducaale.xh
      - Amazon.AWSCLI
      - Microsoft.AzureCLI

  gui:
    darwin:
      - wezterm@nightly
      - slack
      - google-chrome
      - notion
      - raycast
      - visual-studio-code
      - 1password
    windows:
      - wez.wezterm.nightly
      - SlackTechnologies.Slack
      - Google.Chrome
      - Notion.Notion
      - Flow-Launcher.Flow-Launcher
      - Microsoft.PowerToys
      - Microsoft.VisualStudioCode
      - AgileBits.1Password
      - AgileBits.1Password.CLI

  media:
    darwin:
      - ffmpeg
      - imagemagick
      - graphviz
      - exiftool
