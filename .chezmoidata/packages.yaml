# =============================================================================
# [Architecture]: Declarative Package Schema
# [Rationale]: OS-agnostic definition of required GUI and CLI dependencies.
# =============================================================================
packages:
  common:
    - ca-certificates
    - git
    - zsh
    - jq
    - socat
  linux:
    ubuntu:
      - build-essential
      - libssl-dev
      - libasound2t64
    debian:
      - build-essential
      - libssl-dev
      - libasound2
    fedora:
      - gcc-c++
      - openssl-devel
      - alsa-lib
    rhel:
      - gcc-c++
      - openssl-devel
      - alsa-lib
    arch:
      - base-devel
      - openssl
      - alsa-lib
  darwin:
    brews:
      - openssl@3
      - colima
    casks:
      - 1password
      - 1password-cli
      - font-jetbrains-mono-nerd-font
      - wezterm@nightly
      - slack
      - google-chrome
      - notion
      - raycast
      - visual-studio-code
    media:
      - imagemagick
      - ghostscript
      - tectonic
  windows:
    winget:
      - AgileBits.1Password
      - AgileBits.1Password.CLI
      - wez.wezterm.nightly
      - DEVCOM.JetBrainsMonoNerdFont
      - SlackTechnologies.Slack
      - Google.Chrome
      - Notion.Notion
      - Flow-Launcher.Flow-Launcher
      - Microsoft.PowerToys
      - Microsoft.VisualStudioCode
