# =============================================================================
# [Architecture]: Declarative Package Schema (Zero-Toil Edition)
# [Rationale]: Categorized strictly to decouple 'Headless CI Verification' from
# 'GUI Desktop Provisioning'.
# =============================================================================
packages:
  headless:
    common:
      - ca-certificates
      - git
      - zsh
      - jq
      - socat
    linux:
      ubuntu:
        - build-essential
        - libssl-dev
      debian:
        - build-essential
        - libssl-dev
      fedora:
        - gcc-c++
        - openssl-devel
      rhel:
        - gcc-c++
        - openssl-devel
      arch:
        - base-devel
        - openssl
    darwin:
      brews:
        - openssl@3
        - colima
        - clipboard
        - eza
        - xh
      casks:
        - 1password-cli
    windows:
      - AgileBits.1Password.CLI
      - eza-community.eza
      - ducaale.xh

  gui:
    darwin:
      - 1password
      - wezterm@nightly
      - slack
      - google-chrome
      - notion
      - raycast
      - visual-studio-code
    windows:
      - AgileBits.1Password
      - wez.wezterm.nightly
      - SlackTechnologies.Slack
      - Google.Chrome
      - Notion.Notion
      - Flow-Launcher.Flow-Launcher
      - Microsoft.PowerToys
      - Microsoft.VisualStudioCode

  fonts:
    darwin:
      - font-jetbrains-mono-nerd-font
      - font-biz-udgothic
      - font-ibm-plex-sans-jp
    windows:
      - DEVCOM.JetBrainsMonoNerdFont

  media:
    darwin:
      - ffmpeg
      - imagemagick
      - graphviz
