# =============================================================================
# [Architecture]: Declarative Package Schema (Zero-Toil Edition)
# [Rationale]: 1Password is excluded as it is a Tier -2 requirement.
# =============================================================================
packages:
  headless:
    common:
      - ca-certificates
      - git
      - zsh
      - jq
      - socat
    linux:
      ubuntu:
        - build-essential
        - libssl-dev
        - eza
      debian:
        - build-essential
        - libssl-dev
      fedora:
        - gcc-c++
        - openssl-devel
      rhel:
        - gcc-c++
        - openssl-devel
      arch:
        - base-devel
        - openssl
    darwin:
      brews:
        - openssl@3
        - colima
        - clipboard
        - eza
        - xh
      casks: []
    windows:
      - eza-community.eza
      - ducaale.xh

  gui:
    darwin:
      - wezterm@nightly
      - slack
      - google-chrome
      - notion
      - raycast
      - visual-studio-code
    windows:
      - wez.wezterm.nightly
      - SlackTechnologies.Slack
      - Google.Chrome
      - Notion.Notion
      - Flow-Launcher.Flow-Launcher
      - Microsoft.PowerToys
      - Microsoft.VisualStudioCode

  fonts:
    darwin:
      - font-jetbrains-mono-nerd-font
      - font-biz-udgothic
      - font-ibm-plex-sans-jp
    windows:
      - DEVCOM.JetBrainsMonoNerdFont

  media:
    darwin:
      - ffmpeg
      - imagemagick
      - graphviz
      - exiftool
