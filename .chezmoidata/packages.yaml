# =============================================================================
# [Architecture]: Declarative Package Schema
# [Rationale]: Managed via Homebrew (macOS) and WinGet (Windows).
# =============================================================================
packages:
  common:
    - ca-certificates
    - git
    - zsh
    - jq
    - socat
  linux:
    ubuntu:
      - build-essential
      - libssl-dev
    debian:
      - build-essential
      - libssl-dev
    fedora:
      - gcc-c++
      - openssl-devel
    rhel:
      - gcc-c++
      - openssl-devel
    arch:
      - base-devel
      - openssl
  darwin:
    brews:
      - openssl@3
      - colima
      - clipboard
      - eza # [Architecture]: Migrated for native ARM binary
      - xh # [Architecture]: Migrated for native ARM binary
    # [Fix]: Added missing 'media' key to satisfy Brewfile.tmpl logic
    media:
      - ffmpeg
      - imagemagick
      - graphviz
    casks:
      - 1password
      - 1password-cli
      - font-jetbrains-mono-nerd-font
      - font-biz-udgothic
      - font-ibm-plex-sans-jp
      - wezterm@nightly
      - slack
      - google-chrome
      - notion
      - raycast
      - visual-studio-code
  windows:
    winget:
      - AgileBits.1Password
      - AgileBits.1Password.CLI
      - wez.wezterm.nightly
      - DEVCOM.JetBrainsMonoNerdFont
      - SlackTechnologies.Slack
      - Google.Chrome
      - Notion.Notion
      - Flow-Launcher.Flow-Launcher
      - Microsoft.PowerToys
      - Microsoft.VisualStudioCode
      - eza-community.eza # [Architecture]: Windows native
      - ducaale.xh # [Architecture]: Windows native
