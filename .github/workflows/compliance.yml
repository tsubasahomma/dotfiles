# [Architecture]: Sovereign Infrastructure Validation Pipeline (2026 SOTA)
# [Rationale]:
# 1. Simplified bootstrap logic by removing application-layer (Neovim) management.
# 2. Leverages 'chezmoi init' to trigger Tier 2 runtime convergence via Phase 20.
name: compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  convergence:
    name: Convergence & Idempotency Proof
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve Environment & Mapping
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            CHEZMOI_OS="darwin"; MISE_OS="macos"
            if [ "$RUNNER_ARCH" = "ARM64" ]; then
              CHEZMOI_ARCH="arm64"; MISE_ARCH="arm64"
            else
              CHEZMOI_ARCH="amd64"; MISE_ARCH="x64"
            fi
          else
            CHEZMOI_OS="linux"; MISE_OS="linux"
            CHEZMOI_ARCH="amd64"; MISE_ARCH="x64"
          fi

          mkdir -p "$HOME/.local/bin"

          {
            echo "CI=true"
            echo "CHEZMOI_OS=$CHEZMOI_OS"
            echo "CHEZMOI_ARCH=$CHEZMOI_ARCH"
            echo "MISE_OS=$MISE_OS"
            echo "MISE_ARCH=$MISE_ARCH"
          } >> "$GITHUB_ENV"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Tier 0 Tools (op, mise, chezmoi)
        run: |
          DATA_FILE=".chezmoidata/tools.yaml"

          # [Architecture]: Robust Parsing Pattern (Quote-Agnostic)
          CHEZMOI_VER=$(awk '/^ *"?chezmoi"?:/ {gsub(/"/, "", $2); print $2}' "$DATA_FILE")
          CHEZMOI_HASH=$(awk "/^ *\"?chezmoi_hashes\"?:/{f=1} f && /^ *\"?${CHEZMOI_OS}-${CHEZMOI_ARCH}\"?:/{gsub(/\"/, \"\", \$2); print \$2; exit}" "$DATA_FILE")

          MISE_VER=$(awk '/^ *"?mise"?:/ {gsub(/"/, "", $2); print $2}' "$DATA_FILE")
          MISE_HASH=$(awk "/^ *\"?mise_hashes\"?:/{f=1} f && /^ *\"?${MISE_OS}-${MISE_ARCH}\"?:/{gsub(/\"/, \"\", \$2); print \$2; exit}" "$DATA_FILE")

          # Provision chezmoi
          curl -fsSL "https://github.com/twpayne/chezmoi/releases/download/v${CHEZMOI_VER}/chezmoi_${CHEZMOI_VER}_${CHEZMOI_OS}_${CHEZMOI_ARCH}.tar.gz" -o /tmp/chezmoi.tar.gz
          echo "${CHEZMOI_HASH}  /tmp/chezmoi.tar.gz" | shasum -a 256 --check -
          tar -xzf /tmp/chezmoi.tar.gz -C "$HOME/.local/bin" chezmoi

          # Provision mise
          curl -fsSL "https://github.com/jdx/mise/releases/download/v${MISE_VER}/mise-v${MISE_VER}-${MISE_OS}-${MISE_ARCH}" -o "$HOME/.local/bin/mise"
          echo "${MISE_HASH}  $HOME/.local/bin/mise" | shasum -a 256 --check -
          chmod +x "$HOME/.local/bin/mise"

      - name: Provisioning (Atomic Apply)
        run: |
          # [Rationale]: 'chezmoi init' executes Tier 0 bootstrap scripts,
          # and '--apply' ensures 'mise install' (Phase 20) is triggered.
          chezmoi init --source="$GITHUB_WORKSPACE" --apply

      - name: Idempotency Proof (Convergence Validation)
        run: |
          DRIFT_STATUS=$(chezmoi status)
          if [ -n "$DRIFT_STATUS" ]; then
            echo "❌ [Idempotency Failure] Detected drift in managed files."
            echo "$DRIFT_STATUS"
            exit 1
          fi
          echo "✅ [Convergence] Zero-drift confirmed."

      - name: Final Health Check (Doctor)
        if: always()
        run: |
          mise run doctor
