name: Infrastructure Compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  convergence-test:
    name: Convergence & Idempotency Proof
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Zsh (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Resolve Dynamic Environment Variables
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            CERT_PATH="$(brew --prefix)/etc/ca-certificates/cert.pem"
          else
            CERT_PATH="/etc/ssl/certs/ca-certificates.crt"
          fi
          echo "SSL_CERT_FILE=$CERT_PATH" >> $GITHUB_ENV
          echo "MISE_SSL_CERT_FILE=$CERT_PATH" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          echo "SKIP_OP_VALIDATION=true" >> $GITHUB_ENV
          echo "MISE_PYTHON_GITHUB_ATTESTATIONS=false" >> $GITHUB_ENV
          echo "MISE_QUIET=1" >> $GITHUB_ENV
          echo "MISE_VERIFY_METADATA=false" >> $GITHUB_ENV
          # [Rationale]: Provide GITHUB_TOKEN to mise to prevent HTTP 403 Rate Limiting errors.
          # Using github.token ensures authentication for external tool downloads.
          echo "MISE_GITHUB_TOKEN=${{ github.token }}" >> $GITHUB_ENV

      - name: Cache Mise Toolchain
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.local/share/mise
            ~/.local/bin/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('dot_config/mise/config.toml.tmpl') }}

      - name: Bootstrap Chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Align Source Directory
        run: |
          mkdir -p ~/.local/share
          ln -snf "$GITHUB_WORKSPACE" ~/.local/share/chezmoi

      - name: Prepare Identity Mock
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_ci-test.pub
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519_ci-test.pub

      - name: Initialize Chezmoi
        run: |
          chezmoi init --no-tty \
            --promptString gh_user=dotfiles-ci-bot \
            --promptString name="CI Compliance Bot" \
            --promptString email="bot@example.com" \
            --promptString primary_id=ci-test

      - name: Static Analysis
        run: |
          echo "🔍 Running Zsh syntax check on rendered lifecycle scripts..."
          cd ~/.local/share/chezmoi
          find .chezmoiscripts -name "*.sh.tmpl" -exec sh -c '
            for file; do
              chezmoi execute-template "$file" | zsh -n || exit 1
            done
          ' sh {} +

      - name: Phase 1 Provisioning (1st Apply)
        run: |
          echo "🚀 Executing Initial Convergence..."
          chezmoi apply --verbose --no-tty

      - name: System Health Check (Doctor)
        run: |
          echo "🩺 Executing standalone doctor binary..."
          ~/.local/bin/doctor

      - name: Phase 2 Idempotency Proof (Convergence Check)
        run: |
          echo "⚖️ Verifying Absolute Convergence via 'verify'..."
          chezmoi verify
