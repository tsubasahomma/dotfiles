# Chezmoi state validation stays separate from mise runtime integration.
# [Reference]: https://mise.jdx.dev/continuous-integration.html
# This workflow applies chezmoi first, then runs mise-managed integration checks.
name: compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  renovate-config:
    name: Renovate Config Validation
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Pin the validator distribution so CI and local checks use the same Renovate schema.
      # [Reference]: https://docs.renovatebot.com/config-validation/
      RENOVATE_VERSION: "43.150.0"

    steps:
      - name: Checkout Repository
        # Checkout runs on Node.js 24 through FORCE_JAVASCRIPT_ACTIONS_TO_NODE24; Renovate pins the action hash.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve Renovate Shell Node Runtime
        id: renovate-node
        run: |
          node_version="$(sed -n 's/^node = "\([^"]*\)"$/\1/p' dot_config/mise/conf.d/10-tools.toml)"
          case "$node_version" in
            ""|*$'\n'*) exit 1 ;;
          esac
          printf 'Resolved shell Node version: %s\n' "$node_version"
          printf 'node-version=%s\n' "$node_version" >> "$GITHUB_OUTPUT"

      - name: Setup Renovate Shell Node Runtime
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.renovate-node.outputs.node-version }}
          package-manager-cache: false

      - name: Validate Renovate Repository Config
        run: |
          test -f renovate.json5
          node --version
          npx --version
          npx --yes --package "renovate@${RENOVATE_VERSION}" -- renovate-config-validator --version
          npx --yes --package "renovate@${RENOVATE_VERSION}" -- renovate-config-validator --strict

  convergence:
    name: Convergence & Idempotency Proof
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}
      CI: true

    steps:
      - name: Checkout Repository
        # Checkout runs on Node.js 24 through FORCE_JAVASCRIPT_ACTIONS_TO_NODE24; Renovate pins the action hash.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Bootstrap Tier 0 Tools (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          cache: true

      - name: Phase 1 - Provisioning (Static Apply)
        run: |
          chezmoi init --source="$GITHUB_WORKSPACE" --apply

      - name: Phase 2 - Idempotency Proof (Static Convergence)
        run: |
          # Verify that the applied chezmoi state remains byte-for-byte converged.
          if ! chezmoi verify; then
            echo "❌ [Idempotency Failure] State drift detected."
            chezmoi status
            exit 1
          fi
          echo "✅ [Convergence] Zero-drift confirmed."

      - name: Phase 3 - Application Integration (Dynamic Convergence)
        run: |
          mise run integrate:nvim

      - name: Phase 4 - Final Health Check (Doctor)
        if: always()
        run: |
          mise run doctor
