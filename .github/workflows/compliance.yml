# [Architecture]: Sovereign Infrastructure Validation Pipeline (2026 SOTA)
# [Reference]: https://mise.jdx.dev/continuous-integration.html
# [Rationale]: Strictly decouples infrastructure state (chezmoi) from runtime provision (mise).
name: compliance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  convergence:
    name: Convergence & Idempotency Proof
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}
      CI: true

    steps:
      - name: Checkout Repository
        # [Architecture]: Target Node.js 24 environment. Hash will be pinned securely by Renovate.
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bootstrap Tier 0 Tools (mise)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Phase 1 - Provisioning (Static Apply)
        run: |
          chezmoi init --source="$GITHUB_WORKSPACE" --apply

      - name: Phase 2 - Idempotency Proof (Static Convergence)
        run: |
          # [Architecture]: Strict bit-for-bit state verification.
          if ! chezmoi verify; then
            echo "❌ [Idempotency Failure] State drift detected."
            chezmoi status
            exit 1
          fi
          echo "✅ [Convergence] Zero-drift confirmed."

      - name: Phase 3 - Application Integration (Dynamic Convergence)
        run: |
          mise run integrate:nvim

      - name: Phase 4 - Final Health Check (Doctor)
        if: always()
        run: |
          mise run doctor
