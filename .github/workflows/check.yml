# [Architecture]: Sovereign Infrastructure Validation Pipeline (2026 SOTA)
# [Rationale]:
# 1. Unified trigger logic to prevent redundant execution on PR branches.
# 2. Strict deterministic path resolution using direct source flags.
# 3. Concurrency control for resource optimization.
name: check

on:
  push:
    branches: [main, master]
  pull_request:
    # Trigger on any PR to catch 'feat/*' and other branch types.
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

# [Best Practice]: Cancel in-progress runs on the same branch/PR to save CI credits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  convergence:
    name: Convergence & Idempotency Proof
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      # [Rationale]: Opt into Node.js 24 to resolve deprecation warnings for Node.js 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        # [Rationale]: Version 6.0.2 supports Node.js 24 natively.
        uses: actions/checkout@v6.0.2
        with:
          # [Rationale]: Fetch full history for chezmoi's potential git-based operations.
          fetch-depth: 0

      - name: Resolve Environment & Certs
        run: |
          # Detect platform-specific CA store paths.
          if [ "$RUNNER_OS" = "macOS" ]; then
            CERT_PATH="$(brew --prefix)/etc/ca-certificates/cert.pem"
          else
            CERT_PATH="/etc/ssl/certs/ca-certificates.crt"
          fi

          # Initialize hermetic binary directory.
          mkdir -p "$HOME/.local/bin"

          # Inject SSL/TLS context into the environment for mise and curl.
          {
            echo "SSL_CERT_FILE=$CERT_PATH"
            echo "MISE_SSL_CERT_FILE=$CERT_PATH"
            echo "CI=true"
            echo "MISE_GITHUB_TOKEN=${{ github.token }}"
            echo "MISE_PYTHON_GITHUB_ATTESTATIONS=false"
          } >> "$GITHUB_ENV"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Sovereign Tools
        run: |
          # [Diagnostic Phase]: Audit the remote jq binary before atomic bootstrap
          JQ_URL="https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-macos-arm64"
          echo "🔍 [Audit] Checking remote header: $JQ_URL"
          curl -sIL "$JQ_URL" | grep -i "content-length\|content-type"

          # [Rationale]: Log actual hash for comparison with .chezmoidata.yaml
          curl -fsSL "$JQ_URL" -o /tmp/jq_audit
          echo "📏 [Audit] Actual SHA-256: $(shasum -a 256 /tmp/jq_audit | cut -d' ' -f1)"
          echo "📄 [Audit] File Identity: $(file /tmp/jq_audit)"

          # [Rationale]: Avoid pre-installed bloat. Deploy hermetic binaries directly.
          curl https://mise.jdx.dev/install.sh | sh
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Provisioning (Atomic Apply)
        run: |
          # [Architecture]: Directly apply from the checkout workspace.
          # Eliminates the need for 'source-path' symlink workarounds.
          chezmoi init --source="$GITHUB_WORKSPACE" --apply

      - name: Final Health Check (Doctor)
        run: |
          # Assuming 'doctor' is in ~/.local/bin via chezmoi provisioning.
          doctor

      - name: Idempotency Proof (Convergence Validation)
        run: |
          # [Rationale]: Zero-diff verify against the locally checked-out source.
          if ! chezmoi verify --source="$GITHUB_WORKSPACE"; then
            echo "❌ [Idempotency Failure] Detected drift between source and applied state."
            chezmoi diff --source="$GITHUB_WORKSPACE"
            exit 1
          fi
