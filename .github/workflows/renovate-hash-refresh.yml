# [Architecture]: Zero-Toil Integrity Pipeline
# [Rationale]: Delegates imperative hash updates to the 'refresh:integrity' mise task.
# This eliminates redundant logic in the CI definition.

name: renovate-hash-refresh

on:
  pull_request:
    branches: [main, master]
    paths:
      - ".chezmoidata/tools.yaml"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-hashes:
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Execute Integrity Refresh
        run: mise run refresh:integrity

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .chezmoidata/tools.yaml
            git commit -m "chore(infra): update tier 0 integrity hashes via automated task"
            git push
          fi
